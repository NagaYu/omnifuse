# ============================================================
# OmniFuse configuration file
# Every feature works even without tokens, in "dry-run" mode (drafts saved locally).
# See USER_GUIDE.md for detailed setup steps.
# ============================================================

general:
  output_dir: output     # where generated files are saved
  log_dir: logs          # where logs are saved

# --- AI text generation (optional) -----------------------------
# Setting a Claude API key improves the quality of Tone Switcher and Multi Post.
# Works with the built-in templates even if left empty.
anthropic:
  api_key: ""            # e.g. sk-ant-xxxx (the ANTHROPIC_API_KEY env var also works)
  model: claude-opus-4-8

# --- 1. Chart Purify [ChartPurify] ------------------------------
chart:
  accent_color: "#2563EB"   # accent color (blue)
  formats: [png, pdf]       # output formats
  dpi: 200

# --- 2. Doc Deploy [DocDeploy] ----------------------------------
docdeploy:
  target: notion            # notion | confluence | dryrun
  notion:
    token: ""               # Notion integration token (secret_xxx)
    parent_page_id: ""      # parent page ID to deploy into
  confluence:
    base_url: ""            # e.g. https://yourcompany.atlassian.net/wiki
    email: ""               # your Atlassian account email
    api_token: ""           # your Atlassian API token
    space_key: ""           # space key (e.g. DEV)

# --- 3. Tone Switcher [ToneSwitcher] ----------------------------
tone:
  sender_name: ""           # sender name for emails (e.g. Acme Inc. / Jane Doe)
  signature: ""             # email signature
  copy_to_clipboard: true   # automatically copy to the clipboard after generating

# --- 4. Multi Post [MultiPost] ----------------------------------
multipost:
  x:
    access_token: ""        # X API OAuth 2.0 user token (tweet.write scope)
  linkedin:
    access_token: ""        # LinkedIn access token (w_member_social scope)
    author_urn: ""          # e.g. urn:li:person:xxxxxxxx
  qiita:
    access_token: ""        # Qiita personal access token (write_qiita scope)
